<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>大学教辅书籍推荐</title>
  <style>
    :root {
      --green-900: #12452f;
      --green-700: #157a4b;
      --green-600: #1f9a63;
      --green-100: #e6f6ed;
      --green-50: #f3fbf6;
      --mint: #dff4e8;
      --white: #ffffff;
      --text: #1f2d28;
      --muted: #6b7a73;
      --line: #dbe9e2;
      --shadow: 0 14px 34px rgba(18, 69, 47, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(31, 154, 99, 0.14), transparent 32rem),
        linear-gradient(180deg, #f7fcf9 0%, #edf8f2 100%);
    }

    button {
      border: 0;
      font: inherit;
      cursor: pointer;
    }

    .app-shell {
      width: min(100%, 430px);
      min-height: 100vh;
      margin: 0 auto;
      background: linear-gradient(180deg, var(--green-50) 0%, #ffffff 44%);
      box-shadow: 0 0 42px rgba(18, 69, 47, 0.12);
      overflow: hidden;
    }

    .screen {
      display: none;
      min-height: 100vh;
      padding: 22px 18px 28px;
    }

    .screen.active {
      display: block;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 42px;
      margin-bottom: 12px;
    }

    .topbar-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .emblem-small {
      width: 34px;
      height: 34px;
      object-fit: cover;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 50%;
      box-shadow: 0 8px 18px rgba(18, 69, 47, 0.08);
    }

    .back-btn,
    .icon-btn {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      color: var(--green-900);
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 50%;
      box-shadow: 0 8px 18px rgba(18, 69, 47, 0.08);
    }

    .back-btn svg,
    .icon-btn svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2.2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .title-block {
      margin: 18px 0 22px;
    }

    .brand-head {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    .emblem-large {
      width: 74px;
      height: 74px;
      flex: 0 0 auto;
      object-fit: cover;
      background: var(--white);
      border: 3px solid var(--white);
      border-radius: 50%;
      box-shadow: 0 12px 30px rgba(18, 69, 47, 0.16);
    }

    .brand-copy {
      min-width: 0;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--green-700);
      font-size: 13px;
      font-weight: 700;
    }

    h1,
    h2 {
      margin: 0;
      color: var(--green-900);
      letter-spacing: 0;
    }

    h1 {
      font-size: 30px;
      line-height: 1.18;
    }

    h2 {
      font-size: 22px;
      line-height: 1.28;
    }

    .sub {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.65;
    }

    .hero-card {
      padding: 18px;
      margin: 22px 0 18px;
      color: var(--green-900);
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .hero-card strong {
      display: block;
      margin-bottom: 8px;
      font-size: 17px;
    }

    .hero-card span {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      gap: 12px;
    }

    .major-card,
    .year-card,
    .book-card,
    .info-card {
      width: 100%;
      text-align: left;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 10px 24px rgba(18, 69, 47, 0.07);
    }

    .major-card,
    .year-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 16px;
      color: var(--text);
    }

    .major-card:active,
    .year-card:active,
    .book-card:active,
    .tab:active {
      transform: translateY(1px);
    }

    .major-name,
    .year-name {
      display: block;
      color: var(--green-900);
      font-size: 17px;
      font-weight: 800;
    }

    .major-desc,
    .year-desc {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .arrow {
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      color: var(--green-700);
      background: var(--green-100);
      border-radius: 50%;
      font-weight: 900;
    }

    .year-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .year-card {
      min-height: 124px;
      align-items: flex-start;
      flex-direction: column;
    }

    .year-num {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      color: var(--white);
      background: var(--green-700);
      border-radius: 50%;
      font-size: 20px;
      font-weight: 900;
    }

    .selected-line {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      margin-top: 14px;
      color: var(--green-900);
      background: var(--green-100);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
    }

    .filters {
      position: sticky;
      top: 0;
      z-index: 4;
      padding: 10px 0 12px;
      background: linear-gradient(180deg, var(--green-50), rgba(243, 251, 246, 0.92));
      backdrop-filter: blur(8px);
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .tab {
      height: 38px;
      color: var(--green-900);
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 14px;
      font-weight: 800;
    }

    .tab.active {
      color: var(--white);
      background: var(--green-700);
      border-color: var(--green-700);
    }


    @media (max-width: 360px) {
      .brand-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .emblem-large {
        width: 66px;
        height: 66px;
      }
    }

    .book-list {
      margin-top: 10px;
      gap: 12px;
    }

    .book-card {
      display: block;
      padding: 15px;
      color: inherit;
    }

    .book-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 4px 9px;
      color: var(--green-700);
      background: var(--green-100);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
    }

    .chip.soft {
      color: #4d675b;
      background: #f0f5f2;
    }

    .book-title {
      margin: 0 0 8px;
      color: var(--green-900);
      font-size: 18px;
      line-height: 1.35;
      font-weight: 900;
    }

    .book-note {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .book-action {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 13px;
      padding-top: 12px;
      color: var(--green-700);
      border-top: 1px solid var(--line);
      font-size: 14px;
      font-weight: 900;
    }

    .empty {
      padding: 30px 20px;
      text-align: center;
      color: var(--muted);
      background: var(--white);
      border: 1px dashed var(--line);
      border-radius: 8px;
    }

    .detail-head {
      padding: 18px;
      margin: 14px 0;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .detail-title {
      margin: 0 0 12px;
      color: var(--green-900);
      font-size: 24px;
      line-height: 1.3;
    }

    .detail-note {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 22px 0 10px;
      color: var(--green-900);
      font-size: 18px;
      font-weight: 900;
    }

    .info-card {
      padding: 15px;
    }

    .route-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .route-item {
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 10px;
      align-items: start;
      padding: 12px;
      background: var(--green-50);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .route-num {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      color: var(--white);
      background: var(--green-700);
      border-radius: 50%;
      font-weight: 900;
    }

    .route-title {
      display: block;
      margin-bottom: 4px;
      color: var(--green-900);
      font-size: 14px;
      font-weight: 900;
    }

    .route-search {
      display: block;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .hint {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    @media (min-width: 431px) {
      body {
        padding: 24px 0;
      }

      .app-shell {
        min-height: calc(100vh - 48px);
        border-radius: 22px;
      }

      .screen {
        min-height: calc(100vh - 48px);
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <section id="majorScreen" class="screen active" aria-labelledby="majorTitle">
      <div class="title-block">
        <div class="brand-head">
          <img class="emblem-large" src="assets/school-emblem.jpg" alt="工学院院徽" />
          <div class="brand-copy">
            <p class="eyebrow">大学四年教辅导航</p>
            <h1 id="majorTitle">选择专业</h1>
            <p class="sub">先选择你的专业，再按年级查看对应教辅资料。</p>
          </div>
        </div>
      </div>

      <div class="hero-card">
        <strong>请选择你的专业</strong>
        <span>所学课程以培养方案为准，书籍以学委发的书单为准，网站信息仅供参考</span>
      </div>

      <div id="majorList" class="grid"></div>
    </section>

    <section id="yearScreen" class="screen" aria-labelledby="yearTitle">
      <div class="topbar">
        <button class="back-btn" type="button" data-back="majorScreen" aria-label="返回选择专业">
          <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <img class="emblem-small" src="assets/school-emblem.jpg" alt="工学院院徽" />
      </div>

      <div class="title-block">
        <p class="eyebrow">已选择专业</p>
        <h1 id="yearTitle">选择年级</h1>
        <p class="sub">选择你当前所在的大几，进入后仍可以随时切换年级。</p>
        <span id="pickedMajor" class="selected-line"></span>
      </div>

      <div id="yearList" class="grid year-grid"></div>
    </section>

    <section id="bookScreen" class="screen" aria-labelledby="bookTitle">
      <div class="topbar">
        <button class="back-btn" type="button" data-back="yearScreen" aria-label="返回选择年级">
          <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="topbar-title">
          <img class="emblem-small" src="assets/school-emblem.jpg" alt="工学院院徽" />
          <h2 id="bookTitle">教辅书籍</h2>
        </div>
      </div>

      <div class="filters">
        <div id="yearTabs" class="tabs" role="tablist" aria-label="年级切换"></div>
      </div>

      <p id="bookContext" class="sub"></p>
      <div id="bookList" class="grid book-list"></div>
    </section>

    <section id="detailScreen" class="screen" aria-labelledby="detailTitle">
      <div class="topbar">
        <button class="back-btn" type="button" data-back="bookScreen" aria-label="返回教辅列表">
          <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="topbar-title">
          <img class="emblem-small" src="assets/school-emblem.jpg" alt="工学院院徽" />
          <h2>教辅详情</h2>
        </div>
      </div>

      <article id="detailContent"></article>
    </section>
  </main>

  <script src="assets/app-data.js"></script>
  <script>
    const majors = window.APP_DATA?.majors || [];
    const books = window.APP_DATA?.books || [];
    const yearMeta = {
      "\u5927\u4e00": { num: "\u4e00", desc: "\u67e5\u770b\u5927\u4e00\u9700\u8981\u5b66\u4e60\u7684\u6559\u8f85\u8d44\u6599" },
      "\u5927\u4e8c": { num: "\u4e8c", desc: "\u67e5\u770b\u5927\u4e8c\u9700\u8981\u5b66\u4e60\u7684\u6559\u8f85\u8d44\u6599" },
      "\u5927\u4e09": { num: "\u4e09", desc: "\u67e5\u770b\u5927\u4e09\u9700\u8981\u5b66\u4e60\u7684\u6559\u8f85\u8d44\u6599" },
      "\u5927\u56db": { num: "\u56db", desc: "\u67e5\u770b\u5927\u56db\u9700\u8981\u5b66\u4e60\u7684\u6559\u8f85\u8d44\u6599" },
    };
    const yearOrder = ["\u5927\u4e00", "\u5927\u4e8c", "\u5927\u4e09", "\u5927\u56db"];
    const years = yearOrder.map((key) => ({
      key,
      num: yearMeta[key].num,
      desc: yearMeta[key].desc,
    }));

    const state = {
      major: majors[0] || null,
      year: "\u5927\u4e00",
      book: null,
    };

    const screens = {
      majorScreen: document.querySelector("#majorScreen"),
      yearScreen: document.querySelector("#yearScreen"),
      bookScreen: document.querySelector("#bookScreen"),
      detailScreen: document.querySelector("#detailScreen"),
    };

    const majorList = document.querySelector("#majorList");
    const yearList = document.querySelector("#yearList");
    const yearTabs = document.querySelector("#yearTabs");
    const bookList = document.querySelector("#bookList");
    const bookContext = document.querySelector("#bookContext");
    const pickedMajor = document.querySelector("#pickedMajor");
    const detailContent = document.querySelector("#detailContent");

    function showScreen(id) {
      Object.values(screens).forEach((screen) => screen.classList.remove("active"));
      screens[id].classList.add("active");
      window.scrollTo({ top: 0, behavior: "instant" });
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function getYearsForMajor(majorId) {
      const available = new Set(
        books.filter((book) => book.major === majorId).map((book) => book.year)
      );
      return years.filter((year) => available.has(year.key));
    }

    function renderMajors() {
      if (!majors.length) {
        majorList.innerHTML = `<div class="empty">\u8fd8\u6ca1\u6709\u8bfb\u53d6\u5230\u4e13\u4e1a\u6570\u636e\u3002</div>`;
        return;
      }

      majorList.innerHTML = majors
        .map(
          (major) => `
            <button class="major-card" type="button" data-major="${escapeHtml(major.id)}">
              <span>
                <span class="major-name">${escapeHtml(major.name)}</span>
                <span class="major-desc">${escapeHtml(major.desc)}</span>
              </span>
              <span class="arrow">&rsaquo;</span>
            </button>
          `
        )
        .join("");
    }

    function renderYears() {
      if (!state.major) return;
      pickedMajor.textContent = state.major.name;
      const availableYears = getYearsForMajor(state.major.id);
      yearList.innerHTML = availableYears
        .map(
          (year) => `
            <button class="year-card" type="button" data-year="${escapeHtml(year.key)}">
              <span class="year-num">${escapeHtml(year.num)}</span>
              <span>
                <span class="year-name">${escapeHtml(year.key)}</span>
                <span class="year-desc">${escapeHtml(year.desc)}</span>
              </span>
            </button>
          `
        )
        .join("");
    }

    function renderYearTabs() {
      if (!state.major) return;
      yearTabs.innerHTML = getYearsForMajor(state.major.id)
        .map(
          (year) => `
            <button class="tab ${state.year === year.key ? "active" : ""}" type="button" data-year-tab="${escapeHtml(year.key)}">
              ${escapeHtml(year.key)}
            </button>
          `
        )
        .join("");
    }

    function renderBooks() {
      if (!state.major) return;
      renderYearTabs();

      const filtered = books.filter(
        (book) => book.major === state.major.id && book.year === state.year
      );

      bookContext.textContent = `${state.major.name} \u00b7 ${state.year}`;

      if (!filtered.length) {
        bookList.innerHTML = `
          <div class="empty">
            \u8fd9\u4e2a\u5e74\u7ea7\u6682\u65f6\u6ca1\u6709\u5f55\u5165\u6559\u6750\u8d44\u6599\u3002
          </div>
        `;
        return;
      }

      bookList.innerHTML = filtered
        .map(
          (book) => `
            <button class="book-card" type="button" data-book="${escapeHtml(book.id)}">
              <div class="book-meta">
                <span class="chip">${escapeHtml(book.course)}</span>
                ${(book.tags || []).map((tag) => `<span class="chip soft">${escapeHtml(tag)}</span>`).join("")}
              </div>
              <h2 class="book-title">${escapeHtml(book.title)}</h2>
              <p class="book-note">${escapeHtml(book.note)}</p>
              <div class="book-action">
                <span>\u67e5\u770b\u8be6\u60c5</span>
                <span>&rsaquo;</span>
              </div>
            </button>
          `
        )
        .join("");
    }

    function renderDetail() {
      if (!state.book) return;

      detailContent.innerHTML = `
        <div class="detail-head">
          <div class="book-meta">
            <span class="chip">${escapeHtml(state.book.course)}</span>
            <span class="chip soft">${escapeHtml(state.book.year)}</span>
          </div>
          <h1 id="detailTitle" class="detail-title">${escapeHtml(state.book.title)}</h1>
          <p class="detail-note">${escapeHtml(state.book.note)}</p>
        </div>

        <div class="section-title">
          <span>B\u7ad9\u5b66\u4e60\u53c2\u8003</span>
        </div>

        <div class="info-card">
          <ol class="route-list">
            ${(state.book.routes || [])
              .map(
                (route, index) => `
                  <li class="route-item">
                    <span class="route-num">${index + 1}</span>
                    <span>
                      <strong class="route-title">${escapeHtml(route.title)}</strong>
                      <span class="route-search">
                        ${route.url ? `<a href="${escapeHtml(route.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(route.search)}</a>` : escapeHtml(route.search)}
                      </span>
                    </span>
                  </li>
                `
              )
              .join("")}
          </ol>
          <p class="hint">\u89c6\u9891\u7ed3\u679c\u6765\u81ea\u6309\u6559\u6750\u540d\u548c\u8bfe\u7a0b\u540d\u641c\u7d22\u5230\u7684\u516c\u5f00\u5185\u5bb9\uff1b\u5982\u679c\u7ed3\u679c\u4e0d\u51c6\u786e\uff0c\u53ef\u4ee5\u76f4\u63a5\u4f7f\u7528\u641c\u7d22\u5173\u952e\u8bcd\u7ee7\u7eed\u67e5\u627e\u3002</p>
        </div>
      `;
    }

    majorList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-major]");
      if (!button) return;
      state.major = majors.find((major) => major.id === button.dataset.major);
      const availableYears = getYearsForMajor(state.major.id);
      state.year = availableYears[0]?.key || "\u5927\u4e00";
      renderYears();
      showScreen("yearScreen");
    });

    yearList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-year]");
      if (!button) return;
      state.year = button.dataset.year;
      renderBooks();
      showScreen("bookScreen");
    });

    yearTabs.addEventListener("click", (event) => {
      const button = event.target.closest("[data-year-tab]");
      if (!button) return;
      state.year = button.dataset.yearTab;
      renderBooks();
    });

    bookList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-book]");
      if (!button) return;
      state.book = books.find((book) => book.id === button.dataset.book);
      renderDetail();
      showScreen("detailScreen");
    });

    document.querySelectorAll("[data-back]").forEach((button) => {
      button.addEventListener("click", () => showScreen(button.dataset.back));
    });

    if (state.major) {
      const initialYears = getYearsForMajor(state.major.id);
      state.year = initialYears[0]?.key || state.year;
    }

    renderMajors();
    renderYears();
    renderBooks();
  </script>
</body>
</html>
